<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estação Iracemápolis — Mapa de Quadras</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#050805}
body{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;color:#ccc;display:flex;flex-direction:column}
.top-bar{background:linear-gradient(180deg,#0c100c,#080c08);padding:5px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a2a1a;flex-shrink:0;height:34px;z-index:50}
.top-bar h1{font-size:13px;font-weight:700;color:#d0d0d0;letter-spacing:1px}
.top-bar-sub{font-size:7px;color:#3a5a3a;letter-spacing:2.5px;font-weight:600;text-transform:uppercase}
.top-bar-right{display:flex;gap:6px;align-items:center}
.top-bar-info{font-size:9px;color:#555}
.btn-sm{background:#111811;border:1px solid #1e2e1e;color:#5a8a5a;padding:3px 10px;border-radius:4px;font-size:9px;cursor:pointer;font-weight:600;letter-spacing:1px}
.btn-sm:hover{background:#1a2a1a}
.btn-sm.active{background:#1e3a1e;color:#8c8}
.map-container{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#050805}
.map-inner{position:relative;display:inline-block;max-width:100%;max-height:100%}
.map-inner img{display:block;max-width:100%;max-height:calc(100vh - 34px);width:auto;height:auto}
.map-inner svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.map-inner svg polygon{pointer-events:all}

.alert-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#ff5252;box-shadow:0 0 8px rgba(255,82,82,0.8);animation:pulse 1.5s infinite;pointer-events:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.panel{background:#0c140c;border-radius:14px;width:440px;max-width:94vw;max-height:92vh;overflow-y:auto;color:#ddd;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.panel-header{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.panel-qid{font-size:28px;font-weight:800;color:#fff;line-height:1}
.panel-qlbl{font-size:10px;font-weight:700;letter-spacing:2px}
.panel-sbox{border-radius:8px;padding:8px 14px;text-align:center}
.panel-scode{font-size:20px;font-weight:800;line-height:1}
.panel-slbl{font-size:8px;margin-top:3px;opacity:.8;max-width:100px}
.panel-body{padding:14px 20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.info-l{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:600;margin-bottom:2px}
.info-v{font-size:13px;font-weight:600;line-height:1.2}
.prog-wrap{margin-top:16px}.prog-top{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-t{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:600}.prog-p{font-size:9px;color:#666}
.prog-bar{height:5px;background:#1a2a1a;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.fen-wrap{margin-top:16px}.fen-title{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:600;margin-bottom:6px}
.fen-row{display:flex;gap:2px;flex-wrap:wrap}
.fen-item{flex:1;min-width:32px;padding:4px 2px;border-radius:4px;text-align:center;background:#111;border:1px solid #222}
.fen-code{font-size:8px;font-weight:700}.fen-dap{font-size:7px;margin-top:2px}

.studies-wrap{margin-top:18px;border-top:1px solid #1a2a1a;padding-top:14px}
.studies-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.studies-title{font-size:10px;color:#5a8a5a;letter-spacing:2px;font-weight:700}
.studies-add{background:#1a2a1a;color:#8a8;border:1px solid rgba(76,175,80,.27);padding:4px 10px;border-radius:5px;font-size:10px;cursor:pointer;font-weight:700;letter-spacing:0.5px}
.studies-add:hover{filter:brightness(1.2)}
.study-card{background:#0a110a;border:1px solid #1a2a1a;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.study-card.next-alert{border-color:#ff5252;background:rgba(255,82,82,0.05)}
.study-card.next-soon{border-color:#ffb300;background:rgba(255,179,0,0.04)}
.study-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.study-name{font-size:12px;font-weight:700;color:#ddd;flex:1;line-height:1.2}
.study-actions{display:flex;gap:4px}
.study-btn{background:transparent;border:none;color:#666;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}
.study-btn:hover{background:#1a2a1a;color:#aaa}
.study-btn.del:hover{color:#ff5252}
.study-meta{font-size:9px;color:#666;margin-top:4px;line-height:1.4}
.study-meta b{color:#8a8;font-weight:600}
.study-next{margin-top:6px;padding:5px 8px;border-radius:5px;font-size:10px;display:flex;justify-content:space-between;align-items:center}
.next-apl{background:rgba(66,165,245,0.1);color:#64b5f6}
.next-eval{background:rgba(255,179,0,0.1);color:#ffb74d}
.next-today{background:rgba(255,82,82,0.15);color:#ff8a80;font-weight:700}
.next-overdue{background:rgba(255,82,82,0.25);color:#ff5252;font-weight:700}

.study-timeline{margin-top:6px;display:flex;gap:3px;flex-wrap:wrap}
.tl-item{padding:3px 6px;border-radius:4px;font-size:9px;font-weight:600;background:#111;border:1px solid #222;color:#888}
.tl-item.done{background:#1a2a1a;color:#5a8a5a;border-color:#2e4a2e}
.tl-item.today{background:rgba(255,82,82,0.2);color:#ff8a80;border-color:#ff5252}
.tl-item.soon{background:rgba(255,179,0,0.15);color:#ffb74d;border-color:#ffb300}

.panel-btns{padding:0 20px 14px;display:flex;gap:8px}
.p-btn{flex:1;padding:8px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;border:none}
.p-btn:hover{filter:brightness(1.2)}
.p-btn-edit{background:#1a2a1a;color:#8a8;border:1px solid rgba(76,175,80,.27)}
.p-btn-close{background:#1a1a1a;color:#888;border:1px solid #2a2a2a}

.edit-panel{background:#0c140c;border:1px solid #2a3a2a;border-radius:14px;padding:22px;width:400px;max-width:94vw;max-height:92vh;overflow-y:auto;color:#ddd;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.edit-title{font-size:10px;color:#5a8a5a;font-weight:700;letter-spacing:2px}
.edit-id{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px}
.edit-subtitle{font-size:11px;color:#666;margin-bottom:4px}
.e-lbl{display:block;font-size:9px;color:#5a8a5a;margin-top:12px;margin-bottom:3px;letter-spacing:1.5px;font-weight:700}
.e-inp{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #1e2e1e;background:#060a06;color:#ddd;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box}
.e-inp:focus{border-color:#3a5a3a}
.e-row{display:flex;gap:8px}
.e-row > div{flex:1}
.e-hint{font-size:9px;color:#555;margin-top:3px;font-style:italic}
.e-btns{display:flex;gap:8px;margin-top:18px}
.e-btn{flex:1;padding:9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;border:none}
.e-btn:hover{filter:brightness(1.2)}.e-save{background:#1e3a1e;color:#8c8}.e-cancel{background:#222;color:#888}
.e-btn-del{background:#3a1e1e;color:#f88;margin-top:12px;width:100%;padding:8px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;border:none}

.eval-dates{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.eval-chip{background:#060a06;border:1px solid #1e2e1e;border-radius:5px;padding:4px 8px;font-size:11px;color:#ddd;display:flex;align-items:center;gap:6px}
.eval-chip-rm{background:none;border:none;color:#666;cursor:pointer;font-size:13px;padding:0;line-height:1}
.eval-chip-rm:hover{color:#ff5252}
.eval-add-row{display:flex;gap:6px;margin-top:6px}
.eval-add-row input{flex:1}
.eval-add-btn{background:#1a2a1a;color:#8a8;border:1px solid rgba(76,175,80,.27);padding:0 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:700}

.legend-panel{position:fixed;top:42px;left:8px;background:rgba(8,14,8,0.95);border:1px solid #1a2a1a;border-radius:10px;padding:12px;z-index:60;max-width:280px;display:none;backdrop-filter:blur(10px)}
.legend-panel.open{display:block}
.lg-title{font-size:9px;color:#555;letter-spacing:2px;font-weight:700;margin-bottom:6px}
.lg-crops{display:flex;flex-wrap:wrap;gap:3px}
.lg-crop{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:600;display:inline-flex;align-items:center;gap:3px;border:1px solid rgba(255,255,255,0.1)}
.lg-dot{width:6px;height:6px;border-radius:2px;display:inline-block}
.lg-stages{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.lg-stage{display:flex;align-items:center;gap:2px;font-size:8px;color:#777}
.lg-bar{width:3px;height:12px;border-radius:1px;display:inline-block}

.agenda-panel{position:fixed;top:42px;right:8px;background:rgba(8,14,8,0.97);border:1px solid #1a2a1a;border-radius:10px;padding:14px;z-index:60;width:320px;max-width:94vw;max-height:80vh;overflow-y:auto;display:none;backdrop-filter:blur(10px)}
.agenda-panel.open{display:block}
.ag-title{font-size:11px;color:#8a8;letter-spacing:2px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.ag-close{background:none;border:none;color:#666;cursor:pointer;font-size:16px;padding:0}
.ag-group{margin-bottom:12px}
.ag-group-title{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #1a2a1a}
.ag-item{background:#0a110a;border:1px solid #1a2a1a;border-radius:6px;padding:8px 10px;margin-bottom:5px;cursor:pointer}
.ag-item:hover{background:#0e160e}
.ag-item.overdue{border-color:#ff5252}
.ag-item.today{border-color:#ff5252;background:rgba(255,82,82,0.08)}
.ag-item.soon{border-color:#ffb300}
.ag-item-top{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:2px}
.ag-item-qid{font-weight:800;color:#ddd}
.ag-item-date{font-size:10px;font-weight:700}
.ag-item-name{font-size:10px;color:#aaa}
.ag-item-type{font-size:8px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ag-empty{font-size:10px;color:#555;text-align:center;padding:10px;font-style:italic}

/* ============ CSS NOVOS PAINÉIS ============ */
/* Painel de detalhe do estudo (tela cheia) */
.sd-overlay{position:fixed;inset:0;background:#080e08;display:none;z-index:1000;overflow-y:auto}
.sd-overlay.open{display:block}
.sd-panel{max-width:640px;margin:0 auto;padding:14px 14px 80px 14px;color:#d0d8d0}
.sd-header{display:flex;align-items:center;gap:10px;position:sticky;top:0;background:#080e08;padding:8px 0 14px;border-bottom:1px solid #1a2a1a;margin-bottom:12px;z-index:2}
.sd-back{background:none;border:1px solid #2a3a2a;color:#8c8;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.sd-codigo{flex:1;font-size:20px;font-weight:700;color:#afa;letter-spacing:0.3px;word-break:break-all}
.sd-actions{display:flex;gap:6px}
.sd-meta{background:rgba(20,30,20,0.5);border:1px solid #1a2a1a;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px}
.sd-meta-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #1a2a1a}
.sd-meta-item:last-child{border-bottom:none}
.sd-meta-lbl{color:#789;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.sd-section{margin:14px 0}
.sd-section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#789;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sd-add{background:#1e3a1e;color:#afa;border:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;text-transform:none;letter-spacing:0}
.sd-descricao{background:rgba(20,30,20,0.5);border-left:3px solid #2a4a2a;padding:10px;border-radius:0 6px 6px 0;font-size:14px;color:#c0c8c0;line-height:1.5}
.sd-empty{color:#557;font-size:13px;padding:10px;background:rgba(10,15,10,0.5);border:1px dashed #1a2a1a;border-radius:6px;text-align:center}
.sd-next{padding:12px;border-radius:8px;margin:8px 0}
.sd-next.urgent{background:rgba(255,82,82,0.15);border:1px solid #ff5252}
.sd-next.soon{background:rgba(255,152,0,0.15);border:1px solid #ff9800}
.sd-next.normal{background:rgba(33,150,243,0.15);border:1px solid #4a8dd0}
.sd-next-lbl{font-size:10px;color:#789;text-transform:uppercase;letter-spacing:1px}
.sd-next-evt{font-size:15px;font-weight:600;margin:2px 0;color:#e0e8e0}
.sd-next-date{font-size:13px;color:#aab}

/* Tabela de tratamentos */
.trat-table{background:rgba(10,15,10,0.6);border:1px solid #1a2a1a;border-radius:8px;overflow:hidden}
.trat-head{display:grid;grid-template-columns:50px 1fr 80px 80px;gap:6px;padding:8px 10px;background:rgba(30,58,30,0.5);font-size:11px;text-transform:uppercase;color:#789;letter-spacing:0.5px}
.trat-row{display:grid;grid-template-columns:50px 1fr 80px 80px;gap:6px;padding:10px;border-top:1px solid #1a2a1a;font-size:13px;align-items:center}
.trat-id{font-weight:700;color:#afa}
.trat-obs{grid-column:1/-1;font-size:12px;color:#789;font-style:italic;padding-top:4px;border-top:1px dashed #1a2a1a;margin-top:4px}

/* Lista de eventos (aplicações / avaliações) */
.eventos-list{display:flex;flex-direction:column;gap:6px}
.evento-item{background:rgba(20,30,20,0.5);border:1px solid #1a2a1a;border-radius:8px;padding:10px}
.evento-head{display:flex;align-items:center;gap:8px}
.evento-tipo{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;letter-spacing:0.5px}
.evento-tipo.apl{background:#1e3a1e;color:#afa}
.evento-tipo.eval{background:#1e3a5e;color:#aaf}
.evento-data{flex:1;font-size:13px;color:#d0d8d0;font-weight:500}
.evento-del{background:none;border:none;color:#789;font-size:18px;cursor:pointer;padding:0 6px}
.evento-del:hover{color:#ff5252}
.evento-subtipo{font-size:12px;color:#c0c8c0;margin-top:4px;font-weight:500}
.evento-bbch{font-size:11px;color:#8a9;margin-top:4px}
.evento-obs{font-size:13px;color:#c0c8c0;margin-top:6px;padding-top:6px;border-top:1px dashed #1a2a1a;line-height:1.4}

.sd-danger-zone{margin-top:30px;padding-top:20px;border-top:1px solid #2a1a1a;text-align:center}
.btn-danger{background:#3a1a1a;color:#f88;border:1px solid #5a2a2a;padding:10px 20px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-danger:hover{background:#4a2020}

/* Modal de edição de estudo */
.se-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-start;justify-content:center;z-index:1100;overflow-y:auto;padding:20px 10px}
.se-overlay.open{display:flex}
.se-panel{background:#0d150d;border:1px solid #2a3a2a;border-radius:10px;max-width:500px;width:100%;padding:16px;color:#d0d8d0}
.se-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.se-head h3{margin:0;font-size:16px;color:#afa}
.se-x{background:none;border:none;color:#789;font-size:24px;cursor:pointer;padding:0 6px}
.se-field{margin-bottom:12px}
.se-field label{display:block;font-size:11px;text-transform:uppercase;color:#789;letter-spacing:0.5px;margin-bottom:4px}
.se-field .req{color:#f88}
.se-field input,.se-field select,.se-field textarea{width:100%;background:#050805;border:1px solid #2a3a2a;color:#d0d8d0;padding:8px 10px;border-radius:6px;font-family:inherit;font-size:14px;box-sizing:border-box}
.se-field textarea{resize:vertical;min-height:60px;line-height:1.4}
.se-codigo-input{font-size:16px!important;font-weight:600;letter-spacing:0.3px}
.se-row{display:flex;gap:8px;flex-wrap:wrap}
.se-row .se-field{flex:1;min-width:100px}
.se-section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#afa;margin:16px 0 8px;border-top:1px solid #1a2a1a;padding-top:14px}
.se-trat{background:rgba(20,30,20,0.5);border:1px solid #1a2a1a;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
.se-trat-head{display:flex;justify-content:space-between;align-items:center}
.se-trat-id{font-weight:700;color:#afa;font-size:14px}
.se-trat-del{background:none;border:none;color:#789;font-size:20px;cursor:pointer}
.se-trat-del:hover{color:#ff5252}
.se-trat input{background:#050805;border:1px solid #2a3a2a;color:#d0d8d0;padding:6px 8px;border-radius:4px;font-size:13px}
.se-add-trat{background:#1e3a1e;color:#afa;border:1px dashed #2a4a2a;padding:10px;border-radius:6px;font-size:13px;cursor:pointer;width:100%;margin-bottom:12px}
.se-add-trat:hover{background:#25482a}
.se-empty{color:#557;font-size:13px;padding:10px;text-align:center;font-style:italic}
.se-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid #1a2a1a}
.btn-save{flex:1;background:#1e3a1e;color:#afa;border:none;padding:10px;border-radius:6px;font-weight:600;cursor:pointer;font-size:14px}
.btn-save:hover{background:#25482a}
.btn-cancel{background:#222;color:#888;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:14px}

/* Botão export/import */
.toolbar-extra{position:fixed;bottom:14px;right:14px;display:flex;gap:6px;z-index:50}
.toolbar-extra button{background:rgba(20,30,20,0.9);color:#8c8;border:1px solid #2a3a2a;padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;backdrop-filter:blur(10px)}
.toolbar-extra button:hover{background:rgba(30,45,30,0.95)}

/* Cards de estudo reescritos com destaque para código */
.study-card-v2{background:rgba(20,30,20,0.6);border:1px solid #1a2a1a;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s}
.study-card-v2:hover{border-color:#2a4a2a}
.study-card-v2-codigo{font-size:15px;font-weight:700;color:#afa;letter-spacing:0.3px;margin-bottom:4px;word-break:break-all}
.study-card-v2-desc{font-size:12px;color:#789;margin-bottom:6px;line-height:1.3}
.study-card-v2-meta{display:flex;gap:10px;font-size:11px;color:#8a9;flex-wrap:wrap}
.study-card-v2-next{margin-top:6px;padding:6px 8px;border-radius:4px;font-size:11px;display:flex;justify-content:space-between}
.study-card-v2-next.urgent{background:rgba(255,82,82,0.2);color:#faa}
.study-card-v2-next.soon{background:rgba(255,152,0,0.15);color:#fc8}
.study-card-v2-next.normal{background:rgba(33,150,243,0.12);color:#8bf}

</style>
</head>
<body>
<div class="top-bar">
<div><div class="top-bar-sub">Estação Experimental</div><h1>IRACEMÁPOLIS</h1></div>
<div class="top-bar-right">
<span class="top-bar-info" id="dateInfo"></span>
<button class="btn-sm" id="btnAgenda" onclick="toggleAgenda()">AGENDA <span id="agendaBadge" style="color:#ff5252;font-weight:700"></span></button>
<button class="btn-sm" onclick="toggleLegend()">LEGENDA</button>
</div>
</div>
<div class="legend-panel" id="legendPanel"></div>
<div class="agenda-panel" id="agendaPanel"></div>

/* ============ DATE / STAGE UTILS ============ */
function pD(d){
  if(!d)return null;
  var s=String(d).trim();
  var m=s.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*\/\s*(\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m?new Date(+m[1],+m[2]-1,+m[3]):null;
}
function fD(d){
  if(!d)return "";
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  return dd+"/"+mm+"/"+d.getFullYear();
}
function fDIso(d){
  if(!d)return "";
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  return d.getFullYear()+"-"+mm+"-"+dd;
}
function isoToBR(iso){
  if(!iso)return "";
  var m=String(iso).match(/(\d{4})-(\d{2})-(\d{2})/);
  return m?m[3]+"/"+m[2]+"/"+m[1]:iso;
}
function brToIso(br){
  if(!br)return "";
  var m=String(br).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(!m)return "";
  return m[3]+"-"+String(m[2]).padStart(2,'0')+"-"+String(m[1]).padStart(2,'0');
}
function today0(){var d=new Date();d.setHours(0,0,0,0);return d}
function daysBetween(a,b){return Math.round((b-a)/864e5)}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x}

function cDAP(p){var d=pD(p);return d&&!isNaN(d)?Math.floor((today0()-d)/864e5):null}
function gS(c,dap){
  if(dap===null)return{s:"\u2014",l:"Sem data",c:"#616161"};
  if(dap<0)return{s:"PLAN",l:"Plantio em "+Math.abs(dap)+"d",c:"#42a5f5"};
  var t=FEN[c]||FEN._;
  for(var i=0;i<t.length;i++){if(dap<=t[i].m)return t[i]}
  return t[t.length-1];
}
function gC(c){return CC[c]||CC._}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function uid(){return 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ============ STUDY UTILS ============ */
// Compute the "next events" (applications + evaluations) for a study
function studyEvents(study){
  // study = {id,nome,dataInicio (iso), intervaloDias, numAplicacoes, avaliacoes:[iso,...]}
  var out=[];
  var start=pD(isoToBR(study.dataInicio)) || pD(study.dataInicio);
  if(start && !isNaN(start)){
    var n=Math.max(1, parseInt(study.numAplicacoes)||1);
    var iv=parseInt(study.intervaloDias)||0;
    for(var i=0;i<n;i++){
      var dt=(iv>0)?addDays(start,i*iv):new Date(start);
      out.push({type:'apl',idx:i+1,total:n,date:dt});
    }
  }
  (study.avaliacoes||[]).forEach(function(iso,i){
    var d=pD(isoToBR(iso))||pD(iso);
    if(d && !isNaN(d))out.push({type:'eval',idx:i+1,date:d});
  });
  out.sort(function(a,b){return a.date-b.date});
  return out;
}

// Next upcoming event (including today)
function nextEvent(study){
  var t=today0();
  var evs=studyEvents(study);
  for(var i=0;i<evs.length;i++){
    if(evs[i].date >= t)return evs[i];
  }
  // if nothing upcoming, check overdue (past but within 3 days window)
  var last=evs[evs.length-1];
  if(last){
    var diff=daysBetween(last.date,t);
    if(diff<=3)return Object.assign({overdue:true,daysAgo:diff},last);
  }
  return null;
}

// All studies across all quadras, sorted by next event
function allUpcomingEvents(windowDays){
  windowDays = windowDays || 30;
  var t=today0();
  var limit=addDays(t,windowDays);
  var all=[];
  Object.keys(data).forEach(function(qid){
    var q=data[qid];
    (q.estudos||[]).forEach(function(st){
      studyEvents(st).forEach(function(ev){
        var diff=daysBetween(t,ev.date);
        if(diff>=-3 && ev.date<=limit){
          all.push({qid:qid,study:st,event:ev,diff:diff});
        }
      });
    });
  });
  all.sort(function(a,b){return a.event.date-b.event.date});
  return all;
}

function quadraHasAlert(qid){
  var q=data[qid];
  if(!q||!q.estudos||!q.estudos.length)return false;
  for(var i=0;i<q.estudos.length;i++){
    var ne=nextEvent(q.estudos[i]);
    if(ne){
      var diff=daysBetween(today0(),ne.date);
      if(diff<=2)return true;
    }
  }
  return false;
}

      if(e.diff===0)dateLabel='HOJE';
      else if(e.diff===1)dateLabel='Amanhã';
      else if(e.diff===-1)dateLabel='Ontem';
      else if(e.diff<0)dateLabel='há '+Math.abs(e.diff)+'d';
      else dateLabel='em '+e.diff+'d';
      var color = e.diff<=0?'#ff5252':(e.diff<=3?'#ffb74d':'#64b5f6');
      gh+='<div class="ag-item '+cls+'" onclick="closeAgendaAndOpen(\''+e.qid+'\')">';
      gh+='<div class="ag-item-top"><span class="ag-item-qid">'+e.qid+'</span><span class="ag-item-date" style="color:'+color+'">'+dateLabel+'</span></div>';
      gh+='<div class="ag-item-name">'+esc(e.study.nome)+'</div>';
      gh+='<div class="ag-item-type" style="color:'+color+'">'+typeLabel+' • '+fD(e.event.date)+'</div>';
      gh+='</div>';
    });
    gh+='</div>';
    return gh;
  }

  h+=renderGroup('⚠️ ATRASADOS',groups.overdue,'overdue');
  h+=renderGroup('🔴 HOJE',groups.today,'today');
  h+=renderGroup('🟠 PRÓXIMOS 3 DIAS',groups.soon,'soon');
  h+=renderGroup('📅 ESTA SEMANA',groups.week,'');
  h+=renderGroup('📆 PRÓXIMOS 30 DIAS',groups.month,'');

  if(!events.length)h+='<div class="ag-empty">Nenhum evento programado.<br>Adicione estudos nas quadras para visualizar aqui.</div>';

  document.getElementById("agendaPanel").innerHTML=h;
}
function closeAgendaAndOpen(qid){

  showD(qid);
}

function renderStudyCard(qid,study){
  var ne=nextEvent(study);
  var cls='';
  var nextHtml='';
  if(ne){
    var t=today0();
    var diff=daysBetween(t,ne.date);
    var label='';
    var chipCls='next-apl';
    if(ne.type==='eval')chipCls='next-eval';
    if(diff===0){label='HOJE';chipCls='next-today';cls='next-alert'}
    else if(diff<0){label='Atrasado há '+Math.abs(diff)+' dia(s)';chipCls='next-overdue';cls='next-alert'}
    else if(diff<=2){label='em '+diff+' dia'+(diff>1?'s':'');cls='next-soon'}
    else label='em '+diff+' dias';
    var typeName = ne.type==='apl' ? ('Aplicação '+ne.idx+'/'+ne.total) : ('Avaliação '+ne.idx);
    nextHtml='<div class="study-next '+chipCls+'"><span>'+typeName+' • '+fD(ne.date)+'</span><span style="font-weight:700">'+label+'</span></div>';
  }

  // Timeline of all events
  var evs=studyEvents(study);
  var tlHtml='';
  if(evs.length){
    tlHtml='<div class="study-timeline">';
    var t=today0();
    evs.forEach(function(ev){
      var diff=daysBetween(t,ev.date);
      var c='';
      if(diff<0)c='done';
      else if(diff===0)c='today';
      else if(diff<=2)c='soon';
      var lbl = ev.type==='apl' ? ('A'+ev.idx) : ('V'+ev.idx);
      var dateLbl = fD(ev.date).slice(0,5);
      tlHtml+='<span class="tl-item '+c+'" title="'+fD(ev.date)+'">'+lbl+' '+dateLbl+'</span>';
    });
    tlHtml+='</div>';
  }

  var nApl=Math.max(1,parseInt(study.numAplicacoes)||1);
  var intInfo = study.intervaloDias>0 ? (study.intervaloDias+' dias entre aplicações') : 'Aplicação única';
  var nAval=(study.avaliacoes||[]).length;

  var html='<div class="study-card '+cls+'">';
  html+='<div class="study-top"><div class="study-name">'+esc(study.nome||'(sem nome)')+'</div>';
  html+='<div class="study-actions"><button class="study-btn" onclick="openStudyEdit(\''+qid+'\',\''+study.id+'\')" title="Editar">✎</button><button class="study-btn del" onclick="deleteStudy(\''+qid+'\',\''+study.id+'\')" title="Excluir">×</button></div></div>';
  html+='<div class="study-meta"><b>Início:</b> '+(study.dataInicio?fD(pD(isoToBR(study.dataInicio))):'—')+' • <b>'+nApl+'</b> aplicação(ões) • '+intInfo+' • <b>'+nAval+'</b> avaliação(ões)</div>';
  html+=nextHtml;
  html+=tlHtml;
  html+='</div>';
  return html;
}

  h+='<div class="e-row">';
  h+='<div><label class="e-lbl">Nº DE APLICAÇÕES</label>';
  h+='<input id="s_numApl" class="e-inp" type="number" min="1" value="'+(study.numAplicacoes||1)+'"></div>';
  h+='<div><label class="e-lbl">INTERVALO (DIAS)</label>';
  h+='<input id="s_intervalo" class="e-inp" type="number" min="0" value="'+(study.intervaloDias||0)+'" placeholder="Ex: 14"></div>';
  h+='</div>';

  h+='<label class="e-lbl">DATAS DE AVALIAÇÃO</label>';
  h+=avalHtml;
  h+='<div class="eval-add-row"><input id="s_newAval" class="e-inp" type="date"><button class="eval-add-btn" onclick="addAval()">+</button></div>';
  h+='<div class="e-hint">Adicione uma ou mais datas de avaliação de campo.</div>';

  h+='<div class="e-btns"><button class="e-btn e-save" onclick="saveStudy()">SALVAR</button><button class="e-btn e-cancel" onclick="closeStudyEdit()">CANCELAR</button></div>';
  if(!isNew){
    h+='<button class="e-btn-del" onclick="deleteStudy(\''+qid+'\',\''+sid+'\',true)">EXCLUIR ESTUDO</button>';
  }

  document.getElementById("sPnl").innerHTML=h;

  // store working copy
  document.getElementById("sPnl").dataset.study=JSON.stringify(study);
}

function closeStudyEdit(){
  document.getElementById("sOvl").classList.remove("open");
  var qid=curS;curS=null;curSid=null;
  if(qid)showD(qid);
}

function getWorkingStudy(){
  try{return JSON.parse(document.getElementById("sPnl").dataset.study||'{}')}catch(e){return{}}
}
function setWorkingStudy(s){
  document.getElementById("sPnl").dataset.study=JSON.stringify(s);
}

function addAval(){
  var v=document.getElementById("s_newAval").value;
  if(!v)return;
  var s=getWorkingStudy();
  if(!Array.isArray(s.avaliacoes))s.avaliacoes=[];
  if(s.avaliacoes.indexOf(v)===-1){
    s.avaliacoes.push(v);
    s.avaliacoes.sort();
  }
  setWorkingStudy(s);
  // re-render the eval list
  var ul=document.getElementById("evalList");
  var hh='';
  s.avaliacoes.forEach(function(iso,i){
    hh+='<div class="eval-chip"><span>'+fD(pD(isoToBR(iso)))+'</span><button class="eval-chip-rm" onclick="removeAval('+i+')">×</button></div>';
  });
  ul.innerHTML=hh;
  document.getElementById("s_newAval").value='';
}
function removeAval(i){
  var s=getWorkingStudy();
  if(!Array.isArray(s.avaliacoes))return;
  s.avaliacoes.splice(i,1);
  setWorkingStudy(s);
  var ul=document.getElementById("evalList");
  var hh='';
  s.avaliacoes.forEach(function(iso,j){
    hh+='<div class="eval-chip"><span>'+fD(pD(isoToBR(iso)))+'</span><button class="eval-chip-rm" onclick="removeAval('+j+')">×</button></div>';
  });
  ul.innerHTML=hh;
}

function saveStudy(){
  if(!curS)return;
  var s=getWorkingStudy();
  s.nome=document.getElementById("s_nome").value.trim();
  s.dataInicio=document.getElementById("s_dataInicio").value;
  s.numAplicacoes=parseInt(document.getElementById("s_numApl").value)||1;
  s.intervaloDias=parseInt(document.getElementById("s_intervalo").value)||0;
  if(!s.nome){alert("Dê um nome ao estudo.");return}
  if(!s.dataInicio){alert("Informe a data da 1ª aplicação.");return}
  if(!s.id)s.id=uid();

  var q = data[curS]||{};
  if(!Array.isArray(q.estudos))q.estudos=[];
  var idx = q.estudos.findIndex(function(x){return x.id===s.id});
  if(idx>=0)q.estudos[idx]=s; else q.estudos.push(s);
  data[curS]=q;
  save();
  var qid=curS;
  closeStudyEdit();
  render();updateAgendaBadge();
  showD(qid);
}

function deleteStudy(qid,sid,skipConfirm){
  if(!skipConfirm && !confirm("Excluir este estudo? A ação não pode ser desfeita."))return;
  var q=data[qid];if(!q||!q.estudos)return;
  q.estudos=q.estudos.filter(function(s){return s.id!==sid});
  save();
  if(document.getElementById("sOvl").classList.contains("open")){
    closeStudyEdit();
  }
  render();updateAgendaBadge();
  showD(qid);
}

var BBCH_MAP = {

  "Algodao":"algodao",

  "Cafe":"cafe",
  "CITROS":"citros",

  "Melao":"melao",
  "Pastagem":"pastagem",
  "ESTUFAS":"estufa",
  "Estufa":"estufa"
};

function getBBCHList(cultura){
  var k=BBCH_MAP[cultura];
  return k?BBCH[k]:null;
}

function getBBCHInfo(cultura,code){
  var list=getBBCHList(cultura);
  if(!list||!code)return null;
  for(var i=0;i<list.length;i++){
    if(list[i].code===code)return list[i];
  }
  return null;
}

function newStudy(){
  return {
    id:uid(),
    codigo:"",
    descricao:"",
    dataInicio:"",
    intervaloDias:14,
    numAplicacoes:1,
    tratamentos:[],
    numRepeticoes:4,
    aplicacoes:[],
    avaliacoes:[]
  };
}

function newTratamento(numero){
  return {
    id:"T"+numero,
    produto:"",
    dose:"",
    volume:"",
    obs:""
  };
}

function normalizeStudy(s){
  /* Garante que todos os campos existem mesmo em estudos antigos */
  if(!s)return newStudy();
  if(!s.id)s.id=uid();
  if(typeof s.codigo!=="string")s.codigo=s.nome||"";
  if(typeof s.descricao!=="string")s.descricao="";
  if(typeof s.dataInicio!=="string")s.dataInicio="";
  if(typeof s.intervaloDias!=="number")s.intervaloDias=parseInt(s.intervaloDias)||14;
  if(typeof s.numAplicacoes!=="number")s.numAplicacoes=parseInt(s.numAplicacoes)||1;
  if(!Array.isArray(s.tratamentos))s.tratamentos=[];
  if(typeof s.numRepeticoes!=="number")s.numRepeticoes=parseInt(s.numRepeticoes)||4;
  if(!Array.isArray(s.aplicacoes))s.aplicacoes=[];
  /* Converte avaliacoes antigas (array de strings ISO) para novo formato */
  if(Array.isArray(s.avaliacoes)){
    s.avaliacoes=s.avaliacoes.map(function(a){
      if(typeof a==="string")return {id:uid(),data:a,tipo:"",bbch:"",obs:""};
      if(!a.id)a.id=uid();
      if(!a.tipo)a.tipo="";
      if(!a.bbch)a.bbch="";
      if(!a.obs)a.obs="";
      return a;
    });
  }else s.avaliacoes=[];
  return s;
}

/* ============ EVENTOS DE UM ESTUDO (para agenda e timeline) ============ */
function studyEventsV2(study){
  var out=[];
  /* Aplicações programadas (baseado em dataInicio + intervalo) */
  var start=pD(isoToBR(study.dataInicio))||pD(study.dataInicio);
  if(start&&!isNaN(start)){
    var n=Math.max(1,parseInt(study.numAplicacoes)||1);
    var iv=parseInt(study.intervaloDias)||0;
    for(var i=0;i<n;i++){
      var dt=(iv>0)?addDays(start,i*iv):new Date(start);
      /* Verifica se já foi realizada */
      var realizada=(study.aplicacoes||[]).find(function(a){
        var ad=pD(isoToBR(a.data))||pD(a.data);
        return ad&&Math.abs(daysBetween(dt,ad))<=2;
      });
      out.push({
        type:'apl',
        idx:i+1,
        total:n,
        date:dt,
        realizada:!!realizada
      });
    }
  }
  /* Avaliações programadas (as que ainda não foram feitas) */
  (study.avaliacoes||[]).forEach(function(a,i){
    var d=pD(isoToBR(a.data))||pD(a.data);
    if(d&&!isNaN(d)){
      out.push({
        type:'eval',
        idx:i+1,
        date:d,
        tipo:a.tipo||"",
        realizada:!!a.realizada
      });
    }
  });
  return out.sort(function(a,b){return a.date-b.date});
}

function nextEventV2(study){
  var evs=studyEventsV2(study);
  var now=today0();
  for(var i=0;i<evs.length;i++){
    var diff=daysBetween(now,evs[i].date);
    if(diff>=-1&&!evs[i].realizada){
      return {ev:evs[i],diff:diff};
    }
  }
  return null;
}

    study.aplicacoes.sort(function(a,b){return (a.data||"").localeCompare(b.data||"")});

      if(a.bbch){

        h+='<div class="evento-bbch">BBCH '+esc(a.bbch)+(info?' · '+esc(info.fase):'')+'</div>';
      }
      if(a.obs)h+='<div class="evento-obs">'+esc(a.obs)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';

  /* Avaliações */
  h+='<div class="sd-section"><div class="sd-section-title">Avaliações <button class="sd-add" onclick="quickAddAvaliacao()">+ Nova</button></div>';

  }else{
    h+='<div class="eventos-list">';
    var sortAvs=study.avaliacoes.slice().sort(function(a,b){return (a.data||"").localeCompare(b.data||"")});

      h+='<div class="evento-item">';
      h+='<div class="evento-head"><span class="evento-tipo eval">AV '+(i+1)+'</span><span class="evento-data">'+esc(isoToBR(a.data))+'</span>';
      h+='<button class="evento-del" onclick="removeAvaliacaoV2(\''+a.id+'\')">×</button></div>';
      if(a.tipo)h+='<div class="evento-subtipo">'+esc(a.tipo)+'</div>';
      if(a.bbch){
        var infoE=getBBCHInfo(q.cultura,a.bbch);
        h+='<div class="evento-bbch">BBCH '+esc(a.bbch)+(infoE?' · '+esc(infoE.fase):'')+'</div>';
      }
      if(a.obs)h+='<div class="evento-obs">'+esc(a.obs)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';

  /* Botão excluir estudo */

  study=normalizeStudy(study);

  openStudyEditAplicacao(study.aplicacoes[study.aplicacoes.length-1].id);
}

function quickAddAvaliacao(){

  var today=new Date().toISOString().slice(0,10);

function removeAplicacao(id){

function confirmDeleteStudy(qid,sid){
  if(!confirm("Excluir esse estudo? Essa ação não pode ser desfeita."))return;

/* ============ EDIT MODAL PRINCIPAL DO ESTUDO ============ */
var workingStudy=null;

function openStudyEditV2(qid,sid){
  curV=qid;curSid=sid;
  var q=data[qid];
  var existing=(q.estudos||[]).find(function(s){return s.id===sid});
  if(existing){
    workingStudy=JSON.parse(JSON.stringify(normalizeStudy(existing)));
  }else{
    workingStudy=newStudy();
    curSid=workingStudy.id;
  }
  renderStudyEditModal();
  document.getElementById("seOvl").classList.add("open");
}

function openNewStudy(qid){
  curV=qid;
  workingStudy=newStudy();
  curSid=workingStudy.id;
  renderStudyEditModal();
  document.getElementById("seOvl").classList.add("open");
}

function renderStudyEditModal(){
  var s=workingStudy;
  var q=data[curV]||{};
  var bbchList=getBBCHList(q.cultura);

  var h='<div class="se-head"><h3>'+((data[curV].estudos||[]).find(function(x){return x.id===s.id})?'Editar estudo':'Novo estudo')+'</h3><button class="se-x" onclick="closeStudyEditV2()">×</button></div>';

  h+='<div class="se-field"><label>Código do estudo <span class="req">*</span></label>';
  h+='<input type="text" id="seCodigo" value="'+esc(s.codigo)+'" placeholder="EST-2026-0847" class="se-codigo-input"></div>';

  h+='<div class="se-field"><label>Descrição / objetivo</label>';
  h+='<textarea id="seDescricao" placeholder="Ex: Avaliação de eficácia de fungicidas sistêmicos no controle de ferrugem asiática" rows="3">'+esc(s.descricao)+'</textarea></div>';

  h+='<div class="se-row">';
  h+='<div class="se-field"><label>1ª aplicação</label><input type="date" id="seDataInicio" value="'+esc(s.dataInicio)+'"></div>';
  h+='<div class="se-field"><label>Nº aplicações</label><input type="number" id="seNumAp" value="'+s.numAplicacoes+'" min="1" max="20"></div>';
  h+='<div class="se-field"><label>Intervalo (dias)</label><input type="number" id="seIntervalo" value="'+s.intervaloDias+'" min="0" max="90"></div>';
  h+='</div>';

  h+='<div class="se-section-title">Tratamentos</div>';
  h+='<div class="se-field"><label>Repetições por tratamento</label><input type="number" id="seReps" value="'+s.numRepeticoes+'" min="1" max="10" style="width:80px"></div>';

  h+='<div id="seTratList">';
  if(s.tratamentos.length===0){
    h+='<div class="se-empty">Nenhum tratamento. Clique em + para adicionar.</div>';
  }else{
    s.tratamentos.forEach(function(t,i){
      h+='<div class="se-trat" data-idx="'+i+'">';
      h+='<div class="se-trat-head"><span class="se-trat-id">'+esc(t.id)+'</span><button class="se-trat-del" onclick="removeTrat('+i+')">×</button></div>';
      h+='<input type="text" placeholder="Produto" data-f="produto" value="'+esc(t.produto)+'">';
      h+='<div style="display:flex;gap:6px"><input type="text" placeholder="Dose" data-f="dose" value="'+esc(t.dose)+'" style="flex:1"><input type="text" placeholder="V. Calda" data-f="volume" value="'+esc(t.volume)+'" style="flex:1"></div>';
      h+='<input type="text" placeholder="Observações (opcional)" data-f="obs" value="'+esc(t.obs)+'">';
      h+='</div>';
    });
  }
  h+='</div>';
  h+='<button class="se-add-trat" onclick="addTrat()">+ Adicionar tratamento</button>';

  h+='<div class="se-actions"><button class="btn-save" onclick="saveStudyV2()">SALVAR</button><button class="btn-cancel" onclick="closeStudyEditV2()">Cancelar</button></div>';

  document.getElementById("sePnl").innerHTML=h;
}

function addTrat(){
  syncTratInputs();
  var n=workingStudy.tratamentos.length+1;
  workingStudy.tratamentos.push(newTratamento(n));
  renderStudyEditModal();
}

function removeTrat(idx){
  syncTratInputs();
  workingStudy.tratamentos.splice(idx,1);
  /* Renumera */
  workingStudy.tratamentos.forEach(function(t,i){t.id="T"+(i+1)});
  renderStudyEditModal();
}

function syncTratInputs(){
  /* Lê os valores atuais dos inputs para não perder dados ao renderizar */
  var trats=document.querySelectorAll("#seTratList .se-trat");
  trats.forEach(function(el){
    var idx=parseInt(el.getAttribute("data-idx"));
    if(isNaN(idx)||!workingStudy.tratamentos[idx])return;
    var t=workingStudy.tratamentos[idx];
    el.querySelectorAll("input").forEach(function(inp){
      var f=inp.getAttribute("data-f");
      if(f)t[f]=inp.value;
    });
  });
}

function saveStudyV2(){
  syncTratInputs();
  var s=workingStudy;
  s.codigo=document.getElementById("seCodigo").value.trim();
  s.descricao=document.getElementById("seDescricao").value.trim();
  s.dataInicio=document.getElementById("seDataInicio").value;
  s.numAplicacoes=parseInt(document.getElementById("seNumAp").value)||1;
  s.intervaloDias=parseInt(document.getElementById("seIntervalo").value)||0;
  s.numRepeticoes=parseInt(document.getElementById("seReps").value)||4;

  if(!s.codigo){alert("O código do estudo é obrigatório.");return;}

  var q=data[curV];
  if(!q.estudos)q.estudos=[];
  var idx=q.estudos.findIndex(function(x){return x.id===s.id});
  if(idx>=0)q.estudos[idx]=s;
  else q.estudos.push(s);

  save();
  closeStudyEditV2();
  openStudyDetail(curV,s.id);
}

function closeStudyEditV2(){
  document.getElementById("seOvl").classList.remove("open");
  workingStudy=null;
}

/* ============ EXPORT / IMPORT JSON ============ */
function exportData(){
  try{
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='iracemapolis-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(e){alert('Erro ao exportar: '+e.message)}
}
function importData(ev){
  var f=ev.target.files[0];
  if(!f)return;
  if(!confirm('Importar esse backup vai substituir os dados atuais. Continuar?')){ev.target.value='';return}
  var r=new FileReader();
  r.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      Object.keys(imported).forEach(function(k){
        data[k]=imported[k];
        if(!Array.isArray(data[k].estudos))data[k].estudos=[];
      });
      save();render();updateAgendaBadge();
      alert('Backup importado com sucesso.');
    }catch(err){alert('Arquivo inválido: '+err.message)}
    ev.target.value='';
  };
  r.readAsText(f);
}

/* ============ OVERRIDE DO renderStudyCard PARA USAR NOVO PAINEL ============ */
var _origRenderStudyCard=renderStudyCard;
renderStudyCard=function(qid,study){
  study=normalizeStudy(study);
  var ne=nextEventV2(study);
  var nextHtml='',cls='normal';
  if(ne){
    var diff=ne.diff;
    var label=diff===0?'HOJE':(diff<0?'atrasado '+Math.abs(diff)+'d':'em '+diff+'d');
    cls=diff<=0?'urgent':(diff<=3?'soon':'normal');
    var tname=ne.ev.type==='apl'?('Aplicação '+ne.ev.idx+'/'+ne.ev.total):('Avaliação'+(ne.ev.tipo?' — '+ne.ev.tipo:''));
    nextHtml='<div class="study-card-v2-next '+cls+'"><span>'+esc(tname)+'</span><span>'+label+'</span></div>';
  }
  var code=study.codigo||study.nome||'(sem código)';
  var h='<div class="study-card-v2" onclick="openStudyDetail(\''+qid+'\',\''+study.id+'\')">';
  h+='<div class="study-card-v2-codigo">'+esc(code)+'</div>';
  if(study.descricao)h+='<div class="study-card-v2-desc">'+esc(study.descricao.slice(0,100))+(study.descricao.length>100?'…':'')+'</div>';
  h+='<div class="study-card-v2-meta">';
  h+='<span>'+study.tratamentos.length+' trat. × '+study.numRepeticoes+' rep.</span>';
  if(study.dataInicio)h+='<span>início '+esc(isoToBR(study.dataInicio))+'</span>';
  h+='<span>'+study.aplicacoes.length+' apl. feita(s)</span>';
  h+='<span>'+study.avaliacoes.length+' aval.</span>';
  h+='</div>';
  h+=nextHtml;
  h+='</div>';
  return h;
};

/* Override para abrir painel novo quando clica em "+ ADICIONAR" */
function openStudyEdit(qid,sid){

  else openNewStudy(qid);
}

/* Override do load para normalizar estudos antigos */
var _origLoad=load;
load=function(){
  _origLoad();
  Object.keys(data).forEach(function(k){
    if(data[k].estudos&&Array.isArray(data[k].estudos)){
      data[k].estudos=data[k].estudos.map(normalizeStudy);
    }
  });
};

/* Override quadraHasAlert para usar v2 */
var _origQuadraHasAlert=quadraHasAlert;
quadraHasAlert=function(qid){
  var q=data[qid]||{};
  if(!Array.isArray(q.estudos))return false;
  for(var i=0;i<q.estudos.length;i++){
    var s=normalizeStudy(q.estudos[i]);
    var ne=nextEventV2(s);
    if(ne&&ne.diff<=2)return true;
  }
  return false;
};
